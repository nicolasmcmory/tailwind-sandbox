<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Interactivity</title>
</head>

<body>
  <!-- Hover State Styling -->
  <button class="bg-black text-white px-5 py-3 rounded-lg m-5 hover:text-black hover:bg-red-700">Click me</button>

  <!-- Focus State Styling -->
  <button class="bg-red-200 py-3 px-5 rounded-lg m-5 focus:bg-amber-400 focus:text-green-200">New Button</button>

  <!-- Active State Styling -->
  <button class="bg-red-200 py-3 px-5 rounded-lg m-5 active:bg-amber-400 active:text-green-200">New Button</button>

  <!-- Styling based on parent state -->
  <div class="group bg-red-200 h-24 max-w-52 mx-auto hover:bg-amber-400 hover:text-green-700">
    <p class="group-hover:text-blue-600 text-white p-2">Text goes here</p>
  </div>

  <!-- Pseudo Classes -->
  <ul>
    <li class="first:bg-red-400">Item 1</li>
    <li class="first:bg-red-400">Item 2</li>
    <li class="first:bg-red-400">Item 3</li>
    <li class="first:bg-red-400">Item 4</li>
    <li class="first:bg-red-400">Item 5</li>
    <li class="first:bg-red-400">Item 6</li>
    <li class="first:bg-red-400">Item 7</li>
  </ul>
  <!-- Appearance -->
  <!-- Use appearance-none to reset any browser specific styling on an element. This utility is often used when creating custom form components. -->
   <select name="" id="" class="appearance-none">
    <option value="yes">Yes</option>
    <option value="no">No</option>
   </select>

  <!-- Cursor -->

  <!-- Resize -->

  <!-- User Select -->

  <!-- Smooth Scroll Example -->
</body>

</html>
