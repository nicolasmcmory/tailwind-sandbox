<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Colors</title>
  </head>
  <body>
    <!-- Default colors -->
    <!-- white, black, red, green, blue, orange, yellow, purple, lime, emerald, teal, cyan, indigo, violet, fuchsia, pink, rose, sky, gray, slate, zinc, neutral, stone, amber,  -->

    <!-- Text Colors -->
     <p class="text-black">nice stuff</p>
     <p class="text-white">other stuff</p>
     <h class="text-cyan-600">Yes man</h>


    <!-- Background Colors -->
     <p class="bg-black text-white">testing black
     </p>
     <div class="bg-slate-400 text-red-500">red on slate</div>

    <!-- Text Underline -->
     <p class="underline decoration-yellow-800">testing underline</p>

    <!-- Border Colors -->
     <input type="text" class="border-blue-400" placeholder="border testing"/>

    <!-- Divide Colors -->
     <div class="divide-y divide-blue-500">
      <div>I1</div>
      <div>I1</div>
      <div>I1</div>
      <div>I1</div>
      <div>I1</div>
     </div>

    <!-- Outline Colors -->
     <button class="outline outline-">hello</button>
     <button class="outline outline-blue-">hello</button>

    <!-- Box Shadow Colors (Opacity defaults to 100, but you can set it)-->
<button class="shadow-lg shadow-cyan-500 bg-blue-600">test</button>
    <!-- Accent Colors -->
<input type="checkbox" class="accent-purple-500" checked />
    <!-- Arbitrary Colors -->
     <div class="bg-[#427fab]">test</div>
     <p class="bg-red-700 text-blue-300">test</p>
  </body>
</html>
